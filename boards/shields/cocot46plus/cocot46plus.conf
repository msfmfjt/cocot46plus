# Cocot46 Plus ADNS5050 デバッグ設定

# 基本設定
CONFIG_INPUT=y
CONFIG_SPI=y

# ADNS5050ドライバ
CONFIG_ADNS5050=y
CONFIG_INPUT_ADNS5050=y

# ZMKマウス設定（デバッグ後に有効化）
# CONFIG_ZMK_MOUSE=y

# ROW2COL kscan GPIO matrix driver
# Note: The ZMK-specific symbol does not exist on this branch.
# Enable Zephyr KSCAN core only; DT selects the driver via compatible.
CONFIG_KSCAN=y
